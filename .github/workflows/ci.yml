name: TaskFlow CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Testes Automatizados
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧪 Executar testes com Pytest
        run: |
          pytest tests/ -v --tb=short

      - name: 📊 Relatório de cobertura de testes
        run: |
          pip install pytest-cov
          pytest tests/ --cov=src --cov-report=term-missing

  lint:
    name: Qualidade do Código
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Instalar ferramentas de lint
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: 🔍 Verificar qualidade do código com Flake8
        run: |
          flake8 src/ --max-line-length=100 --exclude=__pycache__
